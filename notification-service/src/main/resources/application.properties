spring.application.name=notification-service

server.port=8082

# =========================
# DATABASE
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5433/instagram
spring.datasource.username=guti
spring.datasource.password=guti123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================
# KAFKA
# =========================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# =========================
# USER SERVICE
# =========================
user-service.url=http://localhost:8083

# =========================
# STORY SERVICE
# =========================
story-service.url=http://localhost:8084
