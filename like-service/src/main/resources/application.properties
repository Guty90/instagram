spring.application.name=like-service

server.port=8081

# =========================
# DATABASE
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5433/instagram
spring.datasource.username=guti
spring.datasource.password=guti123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================
# KAFKA
# =========================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# =========================
# STORY SERVICE
# =========================
story-service.url=http://localhost:8084

# =========================
# USER SERVICE
# =========================
user-service.url=http://localhost:8083

# =========================
# REDIS
# =========================
spring.data.redis.host=localhost
spring.data.redis.port=6379